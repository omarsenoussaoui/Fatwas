name: fatwas_app
description: "فتاوى الشيخ بن حنيفية زين العابدين - Fatwas Transcription App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.2
  path: ^1.9.1
  file_picker: ^8.1.7
  http: ^1.3.0
  http_parser: ^4.1.2
  intl: any
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.3.1
  just_audio: ^0.9.43
  mime: ^2.0.0
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter_native_splash:
  color: "#1B5E20"
  image: "assets/icon/splash_icon.png"
  android_12:
    color: "#1B5E20"
    image: "assets/icon/splash_icon.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
